syntax = "proto3";

package cme;

// ── Typed context passed to IConnectionPolicyProvider::canConnect ─────────
// Phase 4: GraphEditorController builds typed context, adapter bridges to map.
message ConnectionPolicyContext {
  // ── Component identifiers ──────────────────────────────────────────────
  string source_component_id = 1;
  string target_component_id = 2;
  string source_type_id      = 3;
  string target_type_id      = 4;
  
  // ── Port/side information (for drag-connect operations) ────────────────
  string source_port         = 5;
  string target_port         = 6;
  
  // ── Connection statistics ──────────────────────────────────────────────
  // Used by policies to enforce cardinality constraints (e.g., max 1 incoming).
  int32  source_outgoing_count  = 7;
  int32  source_incoming_count  = 8;
  int32  target_outgoing_count  = 9;
  int32  target_incoming_count  = 10;
  int32  graph_connection_count = 11;
  
  // ── Extension-defined extra keys ───────────────────────────────────────
  map<string, string> extra = 12;
}

// ── Default values extracted from IComponentTypeProvider ──────────────────
message ComponentTypeDefaults {
  string              type_id             = 1;
  map<string, string> default_properties  = 2;
  double              default_x           = 3;
  double              default_y           = 4;
}

// ── Normalized connection properties from IConnectionPolicyProvider ────────
message ConnectionProperties {
  string              connection_id = 1;
  map<string, string> properties    = 2;
}
